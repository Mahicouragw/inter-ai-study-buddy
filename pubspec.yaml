name: inter_ai_study_buddy
description: AI-powered study companion for Telangana Intermediate (CEC + Languages) — questions, quizzes, ELI5 explanations, AI tutor and exam answers.
publish_to: 'none'
version: 1.4.0+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  file_picker: ^10.1.9
  syncfusion_flutter_pdf: ^25.2.7
  supabase_flutter: ^2.5.6
  flutter_dotenv: ^5.1.0
  crypto: ^3.0.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
